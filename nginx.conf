server {
    listen 5050;

    # Proxy API requests from UI (strip /api prefix)
    location /api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy media requests (speakers fetch audio here)
    location /media/ {
        proxy_pass http://127.0.0.1:5000/media/;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Proxy music endpoints (M3U files for speakers)
    location /music/ {
        proxy_pass http://127.0.0.1:5000/music/;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Proxy radio endpoints
    location /radio/ {
        proxy_pass http://127.0.0.1:5000/radio/;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Proxy storage endpoints
    location /storage/ {
        proxy_pass http://127.0.0.1:5000/storage/;
        proxy_set_header Host $host;
    }

    # Proxy device endpoints
    location /device/ {
        proxy_pass http://127.0.0.1:5000/device/;
        proxy_set_header Host $host;
    }

    location /get-devices {
        proxy_pass http://127.0.0.1:5000/get-devices;
        proxy_set_header Host $host;
    }

    location /refresh-devices {
        proxy_pass http://127.0.0.1:5000/refresh-devices;
        proxy_set_header Host $host;
    }

    # Serve Vue UI static files (fallback — must be last)
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
    }
}
